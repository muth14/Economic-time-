version: '3.8'

services:
  # --- Databases & Infrastructure ---
  postgres:
    image: postgres:15-alpine
    container_name: industrial-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword2026
      POSTGRES_DB: industrial_brain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.12-community
    container_name: industrial-neo4j
    environment:
      NEO4J_AUTH: neo4j/industrial2026
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: industrial-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: industrial-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: industrial-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # --- Application Services ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: industrial-brain-backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - neo4j
      - qdrant
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: industrial-brain-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  minio_data:
